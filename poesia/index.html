<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poesía · Bill Almiron</title>
  <meta name="description" content="Colección de poesía de Bill Almiron — amor, tristeza, sentimiento, esperanza y desamor." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="aurora"></div>
  <canvas id="stars"></canvas>

  <header class="topbar">
    <div class="brand"><span class="dot"></span> Bill Almiron · Poesía</div>
    <div style="display:flex; gap:12px; align-items:center;">
      <a class="back" href="../README.md">← Perfil</a>
      <button class="icon-btn" id="themeBtn" title="Cambiar tema" aria-label="Cambiar tema">🌙</button>
    </div>
  </header>

  <main class="wrap">
    <section class="hero">
      <div class="kicker">Versos &amp; Sentimientos</div>
      <h1>Poesía</h1>
      <p class="sub">Un rincón donde guardo lo que el corazón no supo callar.</p>
    </section>

    <section class="controls">
      <div class="search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" id="search" placeholder="Buscar un verso, un título…" autocomplete="off" />
      </div>
      <div class="filters" id="filters"></div>
    </section>

    <section class="grid" id="grid"></section>
  </main>

  <footer>
    Escrito con <span class="heart">♥</span> por Bill Almiron ·
    <a href="mailto:almironbill@gmail.com">almironbill@gmail.com</a>
  </footer>

  <!-- Modal lector -->
  <div class="modal" id="modal">
    <div class="modal-card" role="dialog" aria-modal="true">
      <button class="close" id="closeModal" aria-label="Cerrar">×</button>
      <span class="tag" id="mTag"></span>
      <h2 id="mTitle"></h2>
      <div class="date" id="mDate"></div>
      <div class="body" id="mBody"></div>
      <div class="nav">
        <button id="prevBtn">← Anterior</button>
        <button id="nextBtn">Siguiente →</button>
      </div>
    </div>
  </div>

  <script src="poemas.js"></script>
  <script src="app.js"></script>
</body>
</html>
